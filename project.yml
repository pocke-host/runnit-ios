name: Runnit
options:
  bundleIdPrefix: live.runnit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: live.runnit.app
    DEVELOPMENT_TEAM: ""

targets:
  Runnit:
    type: application
    platform: iOS
    sources:
      - Runnit
    resources:
      - Runnit/Resources
    settings:
      base:
        INFOPLIST_FILE: Runnit/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: live.runnit.app
    info:
      path: Runnit/Resources/Info.plist
      properties:
        CFBundleName: Runnit
        CFBundleDisplayName: Runnit
        CFBundleIdentifier: live.runnit.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSLocationWhenInUseUsageDescription: "Runnit uses your location to track your runs and routes."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Runnit uses your location to track your runs and routes."
        UIBackgroundModes:
          - location
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - runnit
            CFBundleURLName: live.runnit.app
